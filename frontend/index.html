<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F1F4FA" />
    <title>Blueprint IQ — Extraction Platform</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2304070C'/%3E%3Crect x='0.75' y='0.75' width='30.5' height='30.5' rx='6.25' fill='none' stroke='%2335C8EE' stroke-opacity='0.35' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%2335C8EE' stroke-width='1.8'/%3E%3Cpath d='M16 4v6M16 22v6M4 16h6M22 16h6' stroke='%2335C8EE' stroke-width='1.8' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='1.8' fill='%2367DCF9'/%3E%3C/svg%3E" />
    <script>
      // set theme before first paint to avoid a flash of the wrong mode
      ;(function () {
        try {
          var stored = localStorage.getItem('biq-theme')
          var dark = stored === 'dark'
          var el = document.documentElement
          el.classList.toggle('dark', dark)
          el.style.colorScheme = dark ? 'dark' : 'light'
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#04070C' : '#F1F4FA')
        } catch (e) {}
      })()
    </script>
    <style>
      html { background: #f1f4fa; }
      html.dark { background: #04070c; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
